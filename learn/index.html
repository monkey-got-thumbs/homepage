<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning Hub — Monkey Got Thumbs</title>

    <!-- Canonical & robots -->
    <link rel="canonical" href="https://monkey-got-thumbs.com/learn/">
    <meta name="robots" content="index, follow">

    <!-- Theming -->
    <meta name="theme-color" content="#0E0B1A" />
    <meta name="color-scheme" content="dark">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers:wght@400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="/assets/css/tokens.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/layout.css">

    <!-- SEO Meta -->
    <meta name="description" content="Explore comprehensive learning resources about augmented intelligence. From foundations to frameworks to human factors—find your path." />
    <meta name="keywords" content="augmented intelligence learning, educational resources, AI frameworks, collaboration, trust, human factors" />
    <meta name="author" content="Monkey Got Thumbs" />

    <!-- Open Graph -->
    <meta property="og:title" content="Learning Hub — Monkey Got Thumbs">
    <meta property="og:description" content="Explore comprehensive learning resources about augmented intelligence.">
    <meta property="og:url" content="https://monkey-got-thumbs.com/learn/">
    <meta property="og:image" content="https://monkey-got-thumbs.com/hero.png">
    <meta property="og:type" content="website">

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "Learning Hub",
        "description": "Educational resources about augmented intelligence",
        "url": "https://monkey-got-thumbs.com/learn/",
        "breadcrumb": {
            "@type": "BreadcrumbList",
            "itemListElement": [
                {
                    "@type": "ListItem",
                    "position": 1,
                    "name": "Home",
                    "item": "https://monkey-got-thumbs.com/"
                },
                {
                    "@type": "ListItem",
                    "position": 2,
                    "name": "Learn",
                    "item": "https://monkey-got-thumbs.com/learn/"
                }
            ]
        }
    }
    </script>

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

    <style>
        .learning-section {
            margin-top: 3rem;
            margin-bottom: 3rem;
        }

        .learning-section-title {
            font-family: var(--font-display);
            color: var(--color-accent);
            font-size: 1.875rem;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .course-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all var(--transition-base);
            display: flex;
            flex-direction: column;
        }

        .course-card:hover {
            border-color: var(--color-accent);
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .course-card h3 {
            margin-top: 0;
            color: var(--color-brand-light);
        }

        .course-card p {
            flex: 1;
            margin-bottom: 1rem;
        }

        .course-meta {
            font-size: 0.875rem;
            color: var(--color-muted);
            margin-bottom: 1rem;
        }

        .course-meta-item {
            display: inline-block;
            margin-right: 1rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag {
            display: inline-block;
            background: color-mix(in srgb, var(--color-brand) 20%, transparent);
            color: var(--color-brand-light);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .quick-nav {
            background: color-mix(in srgb, var(--color-bg-secondary) 70%, transparent);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .quick-nav h3 {
            margin-top: 0;
        }

        .quick-nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .quick-nav-list li {
            margin: 0;
        }

        .quick-nav-list a {
            display: inline-block;
            padding: 0.75rem 1rem;
            background: var(--color-brand);
            color: #fff;
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: all var(--transition-base);
            font-weight: 600;
        }

        .quick-nav-list a:hover {
            background: var(--color-brand-light);
        }

        @media (max-width: 768px) {
            .course-grid {
                grid-template-columns: 1fr;
            }

            .quick-nav-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>


    <!-- Main Content -->
    <main id="main-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem 1rem;">

        <h1 style="margin-bottom: 1rem;">Make your ideas real</h1>
        <p style="max-width: 30rem; line-height: 1.9; margin: 0 auto 2.5rem; color: var(--color-fg-secondary);">
            Where are you at?
        </p>

        <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 24rem;">
            <a href="/learn/start/new.html" class="btn">I'm new to AI</a>
            <a href="/learn/foundations/how-it-helps.html" class="btn btn--secondary">I use it but want to be better</a>
            <a href="/learn/foundations/ai-pitfalls.html" class="btn btn--secondary">Show me what's really going on</a>
        </div>

    </main>

    <script src="/assets/js/tracking.js"></script>
    <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
