<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover" />
    <title>Review your cards — Monkey Got Thumbs</title>
    <link rel="canonical" href="https://monkey-got-thumbs.com/learn/review/">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#0E0B1A" />
    <meta name="color-scheme" content="dark">
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers:wght@400&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/tokens.css">
    <link rel="stylesheet" href="/assets/css/base.css">
    <link rel="stylesheet" href="/assets/css/layout.css">
    <meta name="description" content="Review the recall cards you've collected across Monkey Got Thumbs — spaced just before you'd forget. Runs entirely in your browser." />
    <meta name="author" content="Monkey Got Thumbs" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <style>
        .content { max-width: 42rem; margin: 0 auto; padding: 2rem 1rem; }
        .lead { font-size: var(--font-size-lg); color: var(--color-fg-secondary); line-height: 1.7; }
        .rv-stats { display: flex; gap: 0.75rem; flex-wrap: wrap; margin: 1.5rem 0; }
        .rv-stat { flex: 1; min-width: 120px; background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 1rem 1.25rem; text-align: center; }
        .rv-stat b { display: block; font-family: var(--font-display); font-size: var(--font-size-3xl); color: var(--color-accent); line-height: 1.1; }
        .rv-stat span { font-size: var(--font-size-xs); color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.06em; }
        .rv-card { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-left: 4px solid var(--color-accent); border-radius: var(--radius); padding: 1.75rem; margin: 1.5rem 0; }
        .rv-progress { font-size: var(--font-size-xs); color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
        .rv-q { font-size: var(--font-size-xl); font-weight: var(--font-weight-semibold); color: var(--color-fg); line-height: 1.5; }
        .rv-a { margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--color-border); color: var(--color-fg); line-height: 1.7; }
        .rv-a :first-child { margin-top: 0; } .rv-a :last-child { margin-bottom: 0; }
        .rv-actions, .rv-grade { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.25rem; }
        .rv-hint { color: var(--color-muted); font-size: var(--font-size-xs); margin-top: 0.75rem; }
        .rv-page { font-size: var(--font-size-xs); color: var(--color-muted); margin-top: 1rem; }
        .rv-done { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 2rem; text-align: center; margin: 1.5rem 0; }
        .rv-done h2 { margin-top: 0; }
        .rv-tools { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--color-divider); }
        .rv-tools button { background: none; border: 1px solid var(--color-border); color: var(--color-muted); border-radius: 8px; padding: 0.5rem 0.9rem; font: 600 var(--font-size-sm) var(--font-sans); cursor: pointer; }
        .rv-tools button:hover { border-color: var(--color-accent); color: var(--color-accent); }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <mgt-header></mgt-header>
    <main id="main-content">
        <article class="content">
            <nav aria-label="Breadcrumb">
                <ul class="breadcrumbs">
                    <li><a href="/">Home</a></li>
                    <li><a href="/learn/">Learn</a></li>
                    <li><span aria-current="page">Review</span></li>
                </ul>
            </nav>
            <header>
                <h1>Your review</h1>
                <p class="lead">The recall cards you collect as you read, brought back right before you'd forget. No account, no cloud — your whole memory schedule lives in this browser.</p>
            </header>

            <div class="rv-stats" id="stats" hidden></div>
            <div id="runner" aria-live="polite"></div>

            <noscript>
                <div class="rv-done">
                    <h2>Review needs JavaScript</h2>
                    <p>Your spaced-repetition schedule runs entirely in your browser, so this page needs JavaScript enabled. The lessons themselves read fine without it.</p>
                    <p><a class="btn" href="/learn/">Back to the Learning Hub</a></p>
                </div>
            </noscript>

            <div class="rv-tools" id="tools" hidden>
                <button type="button" id="export">Export my cards (.csv)</button>
                <button type="button" id="reset">Reset my progress</button>
            </div>
        </article>
    </main>
    <mgt-footer></mgt-footer>

    <script src="/assets/js/tracking.js"></script>
    <script type="module" src="/assets/js/app.js"></script>
    <script type="module" src="/components/core/mgt-header.js"></script>
    <script type="module" src="/components/core/mgt-footer.js"></script>
    <script type="module">
        import * as srs from '/assets/js/srs.js';

        const runner = document.getElementById('runner');
        const statsEl = document.getElementById('stats');
        const tools = document.getElementById('tools');
        let queue = [], done = 0;

        function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

        function renderStats() {
            const s = srs.stats();
            statsEl.hidden = false;
            statsEl.innerHTML =
                `<div class="rv-stat"><b>${s.due}</b><span>Due now</span></div>` +
                `<div class="rv-stat"><b>${s.reviewed}</b><span>Cards learned</span></div>` +
                `<div class="rv-stat"><b>${s.streak}</b><span>Day streak</span></div>`;
            tools.hidden = s.total === 0;
        }

        function nextDueLabel() {
            const up = srs.allCards().filter(c => (c.reps || 0) > 0 && (c.due || 0) > Date.now()).sort((a, b) => a.due - b.due)[0];
            if (!up) return '';
            const d = Math.max(1, Math.round((up.due - Date.now()) / srs.DAY_MS));
            return `Your next card is due in ${d} day${d === 1 ? '' : 's'}.`;
        }

        function start() {
            renderStats();
            const due = srs.dueCards();
            queue = due.map(c => c.id); done = 0;
            if (!queue.length) return renderEmpty();
            renderCard();
        }

        function renderEmpty() {
            const s = srs.stats();
            runner.innerHTML = s.reviewed
                ? `<div class="rv-done"><h2>All caught up 🎉</h2><p>Nothing is due right now${done ? ` — you reviewed ${done} card${done === 1 ? '' : 's'} just now` : ''}. ${esc(nextDueLabel())}</p><p><a class="btn" href="/learn/">Keep learning</a></p></div>`
                : `<div class="rv-done"><h2>No cards yet</h2><p>Read a lesson and answer its recall cards — they'll appear here, scheduled just before you'd forget. Start with <a href="/learn/frameworks/memory-systems.html">Memory Systems</a>.</p></div>`;
        }

        function renderCard() {
            const c = srs.getCard(queue[0]);
            if (!c) { queue.shift(); return queue.length ? renderCard() : renderEmpty(); }
            runner.innerHTML =
                `<div class="rv-card">
                    <div class="rv-progress">${done + queue.length} to review · ${done} done</div>
                    <div class="rv-q">${esc(c.q || c.id)}</div>
                    <div class="rv-a" id="rvA" hidden>${c.a || '<p>(no answer saved)</p>'}</div>
                    <div class="rv-actions" id="rvReveal"><button class="btn" id="rvShow">Show answer</button></div>
                    <div class="rv-grade" id="rvGrade" hidden>
                        <button class="btn" id="rvYes">I remembered</button>
                        <button class="btn btn--secondary" id="rvNo">I forgot</button>
                    </div>
                    <p class="rv-hint">You grade yourself — honestly. ${c.page ? `From <a href="${esc(c.page)}">${esc(c.page)}</a>.` : ''}</p>
                </div>`;
            document.getElementById('rvShow').addEventListener('click', () => {
                document.getElementById('rvA').hidden = false;
                document.getElementById('rvReveal').hidden = true;
                document.getElementById('rvGrade').hidden = false;
                document.getElementById('rvYes').focus();
            });
            document.getElementById('rvYes').addEventListener('click', () => grade(true));
            document.getElementById('rvNo').addEventListener('click', () => grade(false));
        }

        function grade(ok) {
            const id = queue.shift();
            srs.recordGrade(id, ok);
            try { window.MGT_TRACKING && window.MGT_TRACKING.trackEvent('card_reviewed', { id, page: '/learn/review/', grade: ok ? 'remembered' : 'forgot' }); } catch (_) {}
            done++;
            if (!ok) queue.push(id); // relearn this session
            renderStats();
            queue.length ? renderCard() : renderEmpty();
        }

        document.getElementById('export').addEventListener('click', () => srs.downloadCsv());
        document.getElementById('reset').addEventListener('click', () => {
            if (confirm('Reset all your recall cards and streak on this device? This cannot be undone.')) { srs.reset(); start(); }
        });

        start();
    </script>
</body>
</html>
