<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explorable — the template</title>
<style>
  :root{
    --ink:#EDECF6;--mut:#B9B5D3;--faint:rgba(237,236,246,0.13);--bg:#0E0B1A;
    --inc:#EDECF6;--rent:#6BA8E5;--food:#5FD08A;--fun:#E8B24D;--transport:#B79BEA;--goal:#F0705A;
    --good:#5FD08A;--warn:#E8B24D;--bad:#F0705A;--ghost:#B9B5D3;
    --mono:"SFMono-Regular",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .wrap{max-width:680px;margin:0 auto;padding:64px 28px 90px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:20px}
  .doc{font-size:25px;line-height:2.0;letter-spacing:-0.015em}
  .scrub{font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums;cursor:ew-resize;border-bottom:2px dotted currentColor;padding:0 1px;touch-action:none;border-radius:2px;white-space:nowrap}
  .scrub:hover,.scrub.drag{background:rgba(255,255,255,0.06)}
  .s-inc{color:var(--inc)}.s-rent{color:var(--rent)}.s-food{color:var(--food)}.s-fun{color:var(--fun)}.s-transport{color:var(--transport)}.s-goal{color:var(--goal)}
  .live{font-weight:680;font-variant-numeric:tabular-nums}
  .verdict{font-weight:680}.v-good{color:var(--good)}.v-warn{color:var(--warn)}.v-bad{color:var(--bad)}
  .lock{cursor:pointer;user-select:none;border:none;font-size:0.8em}
  .line{margin-top:34px;font-size:15px;color:var(--mut);line-height:1.7}
  .line a{color:#A6FF4D;cursor:pointer;border-bottom:1px dotted #A6FF4D;margin-right:14px}
  .line a.alt{color:var(--ghost);border-color:var(--ghost)}
  .panel{margin-top:14px;font-size:17px;color:var(--ink);animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}
  .gnum{color:var(--ghost);font-family:var(--mono);font-weight:600}
  .btn{font:inherit;font-size:13px;font-weight:600;padding:3px 11px;border-radius:7px;border:1px solid #A6FF4D;background:#A6FF4D;color:#0E0B1A;cursor:pointer;margin-right:6px}
  .btn.ghost{background:transparent;color:var(--ink);border-color:var(--faint)}
  .chip{font:inherit;font-size:12px;font-family:var(--mono);padding:2px 8px;border:1px solid var(--faint);border-radius:20px;cursor:pointer;margin:0 1px;color:var(--mut)}
  .chip.on{background:#A6FF4D;color:#0E0B1A;border-color:#A6FF4D}
  .whatif{margin-top:18px;padding:14px 16px;border:1px dashed var(--ghost);border-radius:11px;font-size:16px;color:var(--ink);line-height:1.8;animation:fade .22s ease}
  .whatif .h{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ghost);font-weight:700;display:block;margin-bottom:5px}
  .note{margin-top:60px;font-size:12px;color:var(--mut);line-height:1.6;border-top:1px solid var(--faint);padding-top:16px}
  html[data-scheme="light"]    { --bg:#ffffff; --ink:#16161c; --mut:#545163; --faint:rgba(0,0,0,.14); }
  html[data-scheme="contrast"] { --bg:#000000; --ink:#ffffff; --mut:#ededed; --faint:#ffffff; }
  html[data-scheme="sepia"]    { --bg:#f4ecd8; --ink:#3b2f1e; --mut:#6b5a3e; --faint:rgba(59,47,30,.18); }
  html[data-cvd="safe"] {
    --inc:#1E88E5; --rent:#1E88E5; --food:#004D40; --fun:#FFC107; --transport:#785EF0; --goal:#FE6100;
    --good:#004D40; --warn:#FFC107; --bad:#D81B60;
  }
</style>
<link rel="stylesheet" href="/assets/css/accessibility.css">
<script src="/assets/js/a11y-init.js"></script>
<script src="/assets/js/accessibility.js" defer></script>
</head>
<body>
<div style="background:#17122B;color:#EDECF6;font:13px/1 -apple-system,system-ui,sans-serif;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.08)"><a href="/explorables/" style="color:#A6FF4D;text-decoration:none;font-weight:700">&larr; Explorables</a> <span style="opacity:.6">&middot; Monkey Got Thumbs</span></div>
<div class="wrap">
  <div class="kick">A monthly budget · drag any underlined number</div>
  <div class="doc" id="doc"></div>
  <div id="extra"></div>
  <div class="note" id="note"></div>
</div>


<script src="document.js"></script>
</body>
</html>
