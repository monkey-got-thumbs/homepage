<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>How long, really? — Explorable</title>
<style>
  :root{--ink:#EDECF6;--mut:#B9B5D3;--faint:rgba(237,236,246,0.13);--bg:#0E0B1A;--ok:#6BA8E5;--late:#F0705A;--dead:#EDECF6;--handle:#5FD08A;--mono:"SFMono-Regular",ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:34px 24px 80px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:12px}
  .doc{font-size:20px;line-height:1.6}.doc .num{font-family:var(--mono);font-weight:680}.doc .ok{color:var(--ok);font-weight:680}.doc .late{color:var(--late);font-weight:680}
  .hint{font-size:12.5px;color:var(--mut);margin:16px 0 4px}
  svg{display:block;width:100%;height:auto;touch-action:none;user-select:none}

  html[data-scheme="light"]    { --bg:#ffffff; --ink:#16161c; --mut:#545163; --faint:rgba(0,0,0,.14); }
  html[data-scheme="contrast"] { --bg:#000000; --ink:#ffffff; --mut:#ededed; --faint:#ffffff; }
  html[data-scheme="sepia"]    { --bg:#f4ecd8; --ink:#3b2f1e; --mut:#6b5a3e; --faint:rgba(59,47,30,.18); }

  /* Prose semantic colours adapt per scheme (the inline 74%/26% stats and the
     "low · likely · high" hint live in running prose, so they must stay
     readable on the active scheme's page background, not the dark figure). */
  .doc .ok,.hint .ok  { color:var(--ok-prose,var(--ok)) }
  .doc .late          { color:var(--late-prose,var(--late)) }
  .hint .h            { color:var(--handle-prose,var(--handle)) }
  html[data-scheme="light"]    { --ok-prose:#1769b3; --late-prose:#c0392b; --handle-prose:#1f7a34; }
  html[data-scheme="contrast"] { --ok-prose:#7fdfff; --late-prose:#ff8a7a; --handle-prose:#7CFFB0; }
  html[data-scheme="sepia"]    { --ok-prose:#1a5f9e; --late-prose:#a8341f; --handle-prose:#2f6a32; }

  /* The chart is a dark-surfaced data-viz figure: under light/sepia, fig-dark
     gives it a dark background, so re-pin this page's local text/grid vars back
     to their dark-theme values inside the figure (light marks stay valid on
     dark). --ok/--late/--handle/--dead are left to :root/CVD so the colour-blind
     palette still applies inside the chart. */
  html[data-scheme="light"] .fig-dark,
  html[data-scheme="sepia"] .fig-dark {
    --bg:#0E0B1A; --ink:#EDECF6; --mut:#B9B5D3; --faint:rgba(237,236,246,0.13);
    padding:6px 4px;
  }

  html[data-cvd="safe"] { --ok:#1E88E5; --handle:#004D40; --late:#FE6100; --dead:#785EF0; }
  /* breadcrumb — site way-finding, aligned to the content column */
  .exp-crumb{max-width:760px;margin:16px auto 0;padding:0 24px;font-size:13px;color:var(--color-muted,#B9B5D3);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .exp-crumb a{color:var(--color-link,#8FE34D);text-decoration:none;font-weight:600}
  .exp-crumb a:hover{text-decoration:underline}
  .exp-crumb span{opacity:.55}
</style>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/accessibility.css">
<script src="/assets/js/a11y-init.js"></script>
<script src="/assets/js/accessibility.js" defer></script>
</head>
<body>
<mgt-header></mgt-header>
<nav aria-label="Breadcrumb" class="exp-crumb"><a href="/">Home</a><span>›</span><a href="/explorables/">Explorables</a><span>›</span><span aria-current="page">How long, really?</span></nav>
<div class="wrap">
  <div class="kick">Uncertainty · how long will Council consent really take?</div>
  <p class="doc" id="doc"></p>
  <p class="hint">↔ drag the <span class="h">low · likely · high</span> markers under the axis · drag the dark deadline line</p>
  <svg id="sv" class="fig-dark" viewBox="0 0 900 240" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<mgt-footer></mgt-footer>

<script src="uncertainty.js"></script>
<script type="module" src="/assets/js/app.js"></script>
<script type="module" src="/components/core/mgt-header.js"></script>
<script type="module" src="/components/core/mgt-footer.js"></script>
</body>
</html>
