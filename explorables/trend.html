<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Are we over budget? — Explorable</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/accessibility.css">
<script src="/assets/js/a11y-init.js"></script>
<script src="/assets/js/accessibility.js" defer></script>
<style>
  :root{--ink:#EDECF6;--mut:#B9B5D3;--faint:rgba(237,236,246,0.13);--bg:#0E0B1A;--line:#6BA8E5;--budget:#F0705A;--bar:#5FD08A;--over:#F0705A;--mono:"SFMono-Regular",ui-monospace,Menlo,monospace;--p-tot:#6BA8E5;--p-bud:#F0705A;--p-over:#F0705A;--p-ok:#5FD08A}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .bb{background:#17122B;color:#EDECF6;font:13px/1 system-ui;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .bb a{color:#A6FF4D;text-decoration:none;font-weight:700}.bb span{opacity:.6}
  .wrap{max-width:760px;margin:0 auto;padding:34px 24px 80px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:12px}
  .doc{font-size:19px;line-height:1.65}
  .scrub{font-family:var(--mono);font-weight:680;font-variant-numeric:tabular-nums;cursor:ew-resize;border-bottom:2px dotted currentColor;padding:0 1px;touch-action:none;border-radius:2px}
  .scrub:hover,.scrub.drag{background:var(--faint)}.s-bud{color:var(--p-bud)}.s-tot{color:var(--p-tot)}
  .doc .num{font-family:var(--mono);font-weight:680}.doc .over{color:var(--p-over);font-weight:680}.doc .ok{color:var(--p-ok);font-weight:680}
  .hint{font-size:12.5px;color:var(--mut);margin:14px 0 4px}
  svg{display:block;width:100%;height:auto;touch-action:none;user-select:none}
  figure.chart{margin:0;padding:10px;border-radius:12px}
  /* keep the data-viz figure self-consistently dark in light/sepia: re-pin the
     page's local chart tokens to their dark values inside fig-dark (no-op in
     default/contrast, where fig-dark itself is inert) */
  html[data-scheme="light"] .fig-dark,
  html[data-scheme="sepia"] .fig-dark { --bg:#15112c; --ink:#EDECF6; --mut:#B9B5D3; --faint:rgba(237,236,246,0.13); }
  html[data-scheme="light"]    { --bg:#ffffff; --ink:#16161c; --mut:#545163; --faint:rgba(0,0,0,.14); }
  html[data-scheme="contrast"] { --bg:#000000; --ink:#ffffff; --mut:#ededed; --faint:#ffffff; }
  html[data-scheme="sepia"]    { --bg:#f4ecd8; --ink:#3b2f1e; --mut:#6b5a3e; --faint:rgba(59,47,30,.18); }
  /* prose accent colours: keep dark-theme hues by default, darken for light/sepia
     and brighten for contrast so inline scrub/over/ok spans pass AA on the prose bg */
  html[data-scheme="light"]    { --p-tot:#1763a6; --p-bud:#c0392b; --p-over:#c0392b; --p-ok:#1b7a45; }
  html[data-scheme="sepia"]    { --p-tot:#155a96; --p-bud:#b03521; --p-over:#b03521; --p-ok:#1a6b3d; }
  html[data-scheme="contrast"] { --p-tot:#9cc7f2; --p-bud:#ff9d8a; --p-over:#ff9d8a; --p-ok:#7ee2a6; }
  html[data-cvd="safe"] { --line:#1E88E5; --bar:#004D40; --budget:#FE6100; --over:#FE6100; }
  /* breadcrumb — site way-finding, aligned to the content column */
  .exp-crumb{max-width:760px;margin:16px auto 0;padding:0 24px;font-size:13px;color:var(--color-muted,#B9B5D3);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .exp-crumb a{color:var(--color-link,#8FE34D);text-decoration:none;font-weight:600}
  .exp-crumb a:hover{text-decoration:underline}
  .exp-crumb span{opacity:.55}
</style>
</head>
<body>
<mgt-header></mgt-header>
<nav aria-label="Breadcrumb" class="exp-crumb"><a href="/">Home</a><span>›</span><a href="/explorables/">Explorables</a><span>›</span><span aria-current="page">Are we over budget?</span></nav>
<div class="wrap">
  <div class="kick">Trend · 12 months of spend vs a $4.0M budget</div>
  <div class="doc" id="doc"></div>
  <p class="hint">↕ drag a point on the curve · ↔ drag the <span class="s-tot">total</span> or <span class="s-bud">budget</span> in the text</p>
  <figure class="chart fig-dark"><svg id="sv" viewBox="0 0 760 280" preserveAspectRatio="xMidYMid meet"></svg></figure>
</div>

<mgt-footer></mgt-footer>

<script src="trend.js"></script>
<script type="module" src="/assets/js/app.js"></script>
<script type="module" src="/components/core/mgt-header.js"></script>
<script type="module" src="/components/core/mgt-footer.js"></script>
</body>
</html>
