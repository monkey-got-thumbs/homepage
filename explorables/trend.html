<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Are we over budget? — Explorable</title>
<link rel="stylesheet" href="/assets/css/accessibility.css">
<script src="/assets/js/a11y-init.js"></script>
<script src="/assets/js/accessibility.js" defer></script>
<style>
  :root{--ink:#EDECF6;--mut:#B9B5D3;--faint:rgba(237,236,246,0.13);--bg:#0E0B1A;--line:#6BA8E5;--budget:#F0705A;--bar:#5FD08A;--over:#F0705A;--mono:"SFMono-Regular",ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .bb{background:#17122B;color:#EDECF6;font:13px/1 system-ui;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .bb a{color:#A6FF4D;text-decoration:none;font-weight:700}.bb span{opacity:.6}
  .wrap{max-width:760px;margin:0 auto;padding:34px 24px 80px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:12px}
  .doc{font-size:19px;line-height:1.65}
  .scrub{font-family:var(--mono);font-weight:680;font-variant-numeric:tabular-nums;cursor:ew-resize;border-bottom:2px dotted currentColor;padding:0 1px;touch-action:none;border-radius:2px}
  .scrub:hover,.scrub.drag{background:rgba(255,255,255,0.06)}.s-bud{color:var(--budget)}.s-tot{color:var(--line)}
  .doc .num{font-family:var(--mono);font-weight:680}.doc .over{color:var(--over);font-weight:680}.doc .ok{color:var(--bar);font-weight:680}
  .hint{font-size:12.5px;color:var(--mut);margin:14px 0 4px}
  svg{display:block;width:100%;height:auto;touch-action:none;user-select:none}
  html[data-scheme="light"]    { --bg:#ffffff; --ink:#16161c; --mut:#545163; --faint:rgba(0,0,0,.14); }
  html[data-scheme="contrast"] { --bg:#000000; --ink:#ffffff; --mut:#ededed; --faint:#ffffff; }
  html[data-scheme="sepia"]    { --bg:#f4ecd8; --ink:#3b2f1e; --mut:#6b5a3e; --faint:rgba(59,47,30,.18); }
  html[data-cvd="safe"] { --line:#1E88E5; --bar:#004D40; --budget:#FE6100; --over:#FE6100; }
</style>
</head>
<body>
<div class="bb"><a href="/explorables/">← Explorables</a> <span>· Monkey Got Thumbs</span></div>
<div class="wrap">
  <div class="kick">Trend · 12 months of spend vs a $4.0M budget</div>
  <div class="doc" id="doc"></div>
  <p class="hint">↕ drag a point on the curve · ↔ drag the <span class="s-tot">total</span> or <span class="s-bud">budget</span> in the text</p>
  <svg id="sv" viewBox="0 0 760 280" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<script src="trend.js"></script>
</body>
</html>
