<head>
<meta charset="utf-8">

<title>Where the money &amp; the time go — drag a task</title>
<style>
  :root{
    --ink:#EDECF6;--mut:#B9B5D3;--faint:rgba(237,236,246,0.13);--bg:#0E0B1A;
    --crit:#F0705A;--dep:#17122B;--ring:#A6FF4D;
    --mono:"SFMono-Regular",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .wrap{max-width:940px;margin:0 auto;padding:44px 28px 90px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:16px}
  .doc{font-size:20px;line-height:1.7;letter-spacing:-0.01em}
  .doc .num{font-family:var(--mono);font-weight:680}
  .doc .mon{color:var(--crit);font-weight:680}.doc .crit{color:var(--crit);font-weight:680}
  /* the SVG is a data-viz figure: white $-labels live on a warm tan→red node
     gradient, valid only on a dark surface. fig-dark re-pins a dark surface in
     light/sepia; re-pin the page-local viz tokens to their dark values too so
     the node names / edges / ring stay correct over that surface. */
  html[data-scheme="light"] #net.fig-dark,
  html[data-scheme="sepia"] #net.fig-dark{
    --ink:#EDECF6;--mut:#B9B5D3;--bg:#0E0B1A;--dep:#17122B;--crit:#F0705A;--ring:#A6FF4D;
  }
  .hint{font-size:12.5px;color:var(--mut);margin:18px 0 4px}
  svg{display:block;width:100%;height:auto;touch-action:none;user-select:none}
  .node:hover{filter:brightness(1.06)}
  /* steady directional motion only — NO flashing/pulsing. disabled for reduced-motion. */
  .flow{stroke-dasharray:9 7;animation:march .9s linear infinite}
  @keyframes march{to{stroke-dashoffset:-16}}
  @media (prefers-reduced-motion: reduce){ .flow{animation:none} }
  .note{margin-top:40px;font-size:12px;color:var(--mut);line-height:1.6;border-top:1px solid var(--faint);padding-top:14px}
  html[data-scheme="light"]    { --bg:#ffffff; --dep:#f4f4f1; --ink:#16161c; --mut:#545163; --faint:rgba(0,0,0,.14); --crit:#a52714; }
  html[data-scheme="contrast"] { --bg:#000000; --dep:#000000; --ink:#ffffff; --mut:#ededed; --faint:#ffffff; --crit:#ff6a4d; }
  html[data-scheme="sepia"]    { --bg:#f4ecd8; --dep:#ece0c4; --ink:#3b2f1e; --mut:#6b5a3e; --faint:rgba(59,47,30,.18); --crit:#a52714; }
  html[data-cvd="safe"] { --crit:#D81B60; --ring:#004D40; }
  /* breadcrumb — site way-finding, aligned to the content column */
  .exp-crumb{max-width:940px;margin:16px auto 0;padding:0 28px;font-size:13px;color:var(--color-muted,#B9B5D3);display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .exp-crumb a{color:var(--color-link,#8FE34D);text-decoration:none;font-weight:600}
  .exp-crumb a:hover{text-decoration:underline}
  .exp-crumb span{opacity:.55}
</style>

<div class="wrap">
  <div class="kick">A subdivision project · drag the weeks on any task</div>
  <div class="doc" id="doc"></div>
