<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Which option? — Explorable</title>
<style>
  :root{--ink:#EDECF6;--mut:#B9B5D3;--faint:rgba(237,236,246,0.13);--bg:#0E0B1A;--front:#6BA8E5;--dom:#6f6b85;--mono:"SFMono-Regular",ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
  .bb{background:#17122B;color:#EDECF6;font:13px/1 system-ui;padding:10px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .bb a{color:#A6FF4D;text-decoration:none;font-weight:700}.bb span{opacity:.6}
  .wrap{max-width:760px;margin:0 auto;padding:34px 24px 80px}
  .kick{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:12px}
  .doc{font-size:19px;line-height:1.6}.doc .front{color:var(--front);font-weight:680}.doc .dom{color:var(--mut);font-weight:680}
  .hint{font-size:12.5px;color:var(--mut);margin:16px 0 4px}
  svg{display:block;width:100%;height:auto;touch-action:none;user-select:none}
  html[data-scheme="light"]    { --bg:#ffffff; --ink:#16161c; --mut:#545163; --faint:rgba(0,0,0,.14); --front:#0a5fb0; }
  html[data-scheme="contrast"] { --bg:#000000; --ink:#ffffff; --mut:#ededed; --faint:#ffffff; }
  html[data-scheme="sepia"]    { --bg:#f4ecd8; --ink:#3b2f1e; --mut:#6b5a3e; --faint:rgba(59,47,30,.18); --front:#1f5a8a; }
  html[data-cvd="safe"] { --front:#1E88E5; --dom:#785EF0; }
  /* keep the chart's own tokens on their dark values when fig-dark re-pins it (light/sepia only) */
  html[data-scheme="light"] .fig-dark,
  html[data-scheme="sepia"] .fig-dark { --bg:#0E0B1A; --ink:#EDECF6; --mut:#B9B5D3; --faint:rgba(237,236,246,0.13); --front:#6BA8E5; --dom:#6f6b85; }
</style>
<link rel="stylesheet" href="/assets/css/accessibility.css">
<script src="/assets/js/a11y-init.js"></script>
<script src="/assets/js/accessibility.js" defer></script>
</head>
<body>
<div class="bb"><a href="/explorables/">← Explorables</a> <span>· Monkey Got Thumbs</span></div>
<div class="wrap">
  <div class="kick">Trade-off · five ways to deliver, cost vs time</div>
  <p class="doc" id="doc"></p>
  <p class="hint">↙ cheaper &amp; faster is better · drag any point to reprice/retime it · the dashed line is the frontier of real choices; greyed options are beaten on both</p>
  <svg id="sv" class="fig-dark" viewBox="0 0 760 320" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<script src="tradeoff.js"></script>
</body>
</html>
