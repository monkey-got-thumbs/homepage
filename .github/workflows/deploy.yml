name: Deploy site

# Deploys the WHOLE monkey-got-thumbs.com site on every push to main.
# Target: s3://mgt-prod-site (account 824604027328) behind CloudFront E2SM2CL28GMTT0.
# This is the ONLY deploy path — there are no shell-script deploys. Uses the repo's
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY secrets (IAM user github-actions, scoped to
# the site bucket + CloudFront invalidation).
#
# The sync is ADDITIVE (no --delete): the self-hosted model stack under /vendor is
# deployed out-of-band and is NOT in git, so a mirroring delete would wipe it. Files
# removed from the repo therefore linger in S3 until manually pruned.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ── Main site → bucket root ──────────────────────────────────────
      # Everything ships except infra/build files, markdown sources, and
      # writers-digest/ (built separately below so its LLM config points at /api/wd).
      - name: Sync site to S3
        run: |
          aws s3 sync . s3://mgt-prod-site/ \
            --no-progress \
            --cache-control "public,max-age=60" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".idea/*" \
            --exclude ".claude/*" \
            --exclude ".playwright-mcp/*" \
            --exclude "scripts/*" \
            --exclude "content/*" \
            --exclude "writers-digest/*" \
            --exclude "vendor/*" \
            --exclude "*.md" \
            --exclude ".gitignore" \
            --exclude "CNAME" \
            --exclude ".DS_Store" \
            --exclude "**/.DS_Store" \
            --exclude "notes/*" --include "notes/*.html"

      # ── Writers Digest → /writers-digest/ (point LLM at same-origin /api/wd) ──
      - name: Build + sync Writers Digest
        run: |
          rm -rf out && mkdir -p out/app
          cp writers-digest/index.html out/
          cp writers-digest/app/*.js out/app/
          printf "/* deploy config */\nwindow.WD_LLM_ENDPOINT = '/api/wd';\n" > out/app/config.js
          aws s3 sync out s3://mgt-prod-site/writers-digest/ \
            --no-progress --delete --cache-control "public,max-age=60"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2SM2CL28GMTT0 \
            --paths "/*"

      - name: Done
        run: echo "✓ deployed https://monkey-got-thumbs.com/"
