name: Deploy site

# Deploys the whole site to mgt.codeology.co.nz on every push to main.
# Target: codeology Org account 704225641352 — s3://codeology-mgt-site-704225641352
# behind CloudFront E1HGY9I3DL1PFX. Auth is GitHub OIDC (no long-lived keys):
# the workflow assumes IAM role `github-deploy`, whose trust is scoped to
# repo:monkey-got-thumbs/homepage on refs/heads/main.
#
# The sync is ADDITIVE for the main site (no --delete) and writers-digest is built
# separately with its LLM endpoint pointed at the same-origin /api/wd Lambda.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write      # required for OIDC
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  BUCKET: codeology-mgt-site-704225641352
  DISTRIBUTION_ID: E1HGY9I3DL1PFX
  DEPLOY_ROLE: arn:aws:iam::704225641352:role/github-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Main site → bucket root ──────────────────────────────────────
      - name: Sync site to S3
        run: |
          aws s3 sync . s3://$BUCKET/ \
            --no-progress \
            --cache-control "public,max-age=60" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".idea/*" \
            --exclude ".claude/*" \
            --exclude ".playwright-mcp/*" \
            --exclude "scripts/*" \
            --exclude "content/*" \
            --exclude "writers-digest/*" \
            --exclude "vendor/*" \
            --exclude "*.md" \
            --exclude ".gitignore" \
            --exclude "CNAME" \
            --exclude ".DS_Store" \
            --exclude "**/.DS_Store" \
            --exclude "notes/*" --include "notes/*.html"

      # ── Writers Digest → /writers-digest/ (LLM at same-origin /api/wd) ──
      - name: Build + sync Writers Digest
        run: |
          rm -rf out && mkdir -p out/app
          cp writers-digest/index.html out/
          cp writers-digest/app/*.js out/app/
          printf "/* deploy config */\nwindow.WD_LLM_ENDPOINT = '/api/wd';\n" > out/app/config.js
          aws s3 sync out s3://$BUCKET/writers-digest/ \
            --no-progress --delete --cache-control "public,max-age=60"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"

      - name: Done
        run: echo "✓ deployed https://mgt.codeology.co.nz/"
