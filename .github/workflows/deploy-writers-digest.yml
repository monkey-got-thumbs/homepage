name: Deploy Writers Digest

# Publishes the Writers Digest app to the live site at
# https://monkey-got-thumbs.com/writers-digest/  (S3 mgt-prod-site + CloudFront).
# Uses the repo's AWS secrets — no local creds needed. The app's LLM is reached at
# the same-origin /api/wd Lambda (stood up by terraform/environments/mgt; the
# Kererū key stays server-side).

on:
  push:
    branches: [main]
    paths:
      - 'writers-digest/**'
      - '.github/workflows/deploy-writers-digest.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build bundle (point LLM at same-origin /api/wd)
        run: |
          rm -rf out && mkdir -p out/app
          cp writers-digest/index.html out/
          cp writers-digest/app/*.js out/app/
          printf "/* deploy config */\nwindow.WD_LLM_ENDPOINT = '/api/wd';\n" > out/app/config.js

      - name: Sync to S3
        run: |
          aws s3 sync out s3://${{ vars.SITE_BUCKET || 'mgt-prod-site' }}/writers-digest/ \
            --delete --cache-control "public,max-age=60"

      - name: Invalidate CloudFront
        run: |
          DIST=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'monkey-got-thumbs.com')].Id | [0]" \
            --output text)
          echo "distribution: $DIST"
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/writers-digest/*"

      - name: Done
        run: echo "✓ https://monkey-got-thumbs.com/writers-digest/"
